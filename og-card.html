<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  html, body { margin: 0; padding: 0; }
  body {
    width: 1200px;
    height: 630px;
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
    background: #0a0a0a;
    color: #e8e8e8;
    overflow: hidden;
    position: relative;
  }
  .glow {
    position: absolute;
    width: 800px;
    height: 800px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(17,163,42,0.18) 0%, rgba(17,163,42,0) 60%);
    top: -200px;
    right: -200px;
  }
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 48px 48px;
  }
  .container {
    position: relative;
    padding: 72px 80px;
    height: 100%;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 14px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 22px;
    color: #11A32A;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .brand-mark {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: #11A32A;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 800;
    font-size: 18px;
    letter-spacing: -1px;
  }
  h1 {
    font-size: 84px;
    line-height: 0.98;
    font-weight: 800;
    letter-spacing: -3px;
    margin: 0 0 24px 0;
    color: #f5f5f5;
  }
  h1 .accent { color: #11A32A; }
  .sub {
    font-size: 28px;
    color: #888;
    line-height: 1.35;
    max-width: 920px;
    margin: 0;
    font-weight: 400;
  }
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }
  .chips {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .chip {
    padding: 8px 16px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 999px;
    font-size: 17px;
    color: #bbb;
  }
  .chip.win {
    background: rgba(17,163,42,0.12);
    border-color: rgba(17,163,42,0.4);
    color: #5fd372;
  }
  .url {
    font-size: 22px;
    color: #999;
    font-weight: 500;
  }
  .url .green { color: #11A32A; }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="grid"></div>
  <div class="container">
    <div class="brand">
      <div class="brand-mark">~*</div>
      <span>usectl / free tools</span>
    </div>

    <div>
      <h1>cloud bill<br>estimator<span class="accent">.</span></h1>
      <p class="sub">paste your app config — see what you'd pay on AWS, GCP, Azure, Vercel, Railway, Render &amp; usectl. side by side, no signup.</p>
    </div>

    <div class="footer">
      <div class="chips">
        <span class="chip">AWS</span>
        <span class="chip">GCP</span>
        <span class="chip">Azure</span>
        <span class="chip">Vercel</span>
        <span class="chip">Railway</span>
        <span class="chip">Render</span>
        <span class="chip win">usectl</span>
      </div>
      <div class="url"><span class="green">→</span> cloud-bill-estimator.usectl.com</div>
    </div>
  </div>
</body>
</html>
